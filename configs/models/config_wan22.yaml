common:
  num_gpus: 4
datasets:
  vla_data:
    action_type: delta_qpos
    data_root_dir: data/datasets/libero_datasets
    dataloader_module: lerobot_datasets
    dataset_mix: libero_all
    include_state: false
    load_all_data_for_training: true
    load_next_frame: true
    obs:
    - image_0
    per_device_batch_size: 16
    sequential_step_sampling: false
    video_backend: torchvision_av
environment:
  wandb_base_url: https://api.bandw.top
  wandb_entity: ''
  wandb_mode: disabled
  wandb_project: WM-Ex
framework:
  action_model:
    action_dim: 7
    action_hidden_dim: 1024
    action_horizon: 8
    action_model_type: DiT-B
    add_pos_embed: true
    diffusion_model_cfg:
      cross_attention_dim: 1024
      dropout: 0.2
      output_dim: 1024
    future_action_window_size: 7
    hidden_size: 1024
    max_seq_len: 1024
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    num_timestep_buckets: 1000
    past_action_window_size: 0
    repeated_diffusion_steps: 8
    state_dim: 7
  name: QwenGR00T
  qwenvl:
    base_vlm: world_model-wan2.2
  world_model:
    backend: wan2.2
    checkpoint_path: data/pretrained_models/Wan2.2-TI2V-5B
    freeze_encoder: false
    fusion_type: cross_attention
    hidden_size: 1024
    image_size: 224
    num_fusion_layers: 2
    pretrained_dir: data/pretrained_models/Wan2.2-TI2V-5B
    text_encoder_path: ''
    text_encoder_type: precomputed
    text_hidden_size: 4096
    use_intermediate_features: true
    use_video_loss: true
    video_loss_weight: 1.0
    # WAN DiT action-feature layer (30 layers total, ~47% depth).
    # NOTE: post-fix (2026-04-23) _register_hooks now honors this when
    # intermediate_layer_ids is absent, yielding SINGLE-LAYER hook.
    # WM-WAN22-v1 ckpt predates this fix and was trained with the
    # legacy 4-layer auto-select mean ([6,13,20,27]). Re-training
    # required to activate single-layer behavior.
    feature_layer_id: 14
    # Optional variant override; null = auto-detect from checkpoint_path
    # (path contains '14b'/'t2v' -> t2v-A14B, else ti2v-5B).
    wan_variant: null
    # Diffusion sigma schedule (matches Cosmos scheduler_config.json).
    sigma_min: 0.002
    sigma_max: 80.0
    sigma_data: 1.0
    sigma_conditional: 0.0001
output_root_dir: ./results/training
run_id: WM-WAN22-v1
seed: 42
trainer:
  eval_interval: 99999
  gradient_accumulation_steps: 1
  gradient_clipping: 1.0
  is_resume: false
  learning_rate:
    action_model: 0.0001
    base: 0.0001
    qwen_vl_interface: 1.0e-05
  logging_frequency: 1
  lr_scheduler_type: cosine_with_min_lr
  max_train_steps: 30000
  num_warmup_steps: 5000
  optimizer:
    betas:
    - 0.9
    - 0.95
    eps: 1.0e-08
    weight_decay: 1.0e-08
  save_interval: 5000
  save_training_state: false
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
